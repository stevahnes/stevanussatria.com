coverage:
  status:
    project:
      frontend:
        target: auto
        flags: frontend
      backend:
        target: auto
        flags: backend
    patch:
      frontend:
        target: auto
        flags: frontend
      backend:
        target: auto
        flags: backend

flags:
  frontend:
    paths:
      - frontend/
    carryforward: true
  backend:
    paths:
      - backend/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
